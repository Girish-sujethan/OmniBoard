services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - backend_uploads:/app/uploads
      - backend_generated:/app/generated
      - stm32_docs:/app/stm32
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_generated:
  stm32_docs:
